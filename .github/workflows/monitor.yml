name: Gizmodo RSS Monitor
on:
  repository_dispatch:
    types: [trigger_rss_check]
  workflow_dispatch: # 手動実行可能
jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # state.json の変更をコミットして書き戻すために必要
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Run Monitor Script
        env:
          DISCORD_WEBHOOK_GIZMODO: ${{ secrets.DISCORD_WEBHOOK_GIZMODO }}
          DISCORD_WEBHOOK_ITMEDIA: ${{ secrets.DISCORD_WEBHOOK_ITMEDIA }}
          DISCORD_WEBHOOK_ASCII: ${{ secrets.DISCORD_WEBHOOK_ASCII }}
          DISCORD_WEBHOOK_PCWATCH: ${{ secrets.DISCORD_WEBHOOK_PCWATCH }}
          DISCORD_WEBHOOK_KTAI: ${{ secrets.DISCORD_WEBHOOK_KTAI }}
        run: python gizmodo_monitor.py
      - name: Commit and Push state.json if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 新規ファイルも含めてステージングに追加
          git add state.json
          
          # コミットすべき変更（新規作成・更新）があるか確認
          if ! git diff --staged --quiet; then
            echo "State file changed or created. Committing and pushing..."
            git commit -m "chore: update RSS state [skip ci]"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No state changes detected."
          fi
